<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitForge — Local Demo</title>
  <style>
    :root {
      --primary: #6C5CE7;
      --accent: #00D2D3;
      --bg: #0F0F1A;
      --card: #1A1A2E;
      --text: #E8E8F0;
      --text-muted: #8888AA;
      --border: #2D2D4A;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0F0F1A; color: var(--text); }
    .container { max-width: 800px; margin: 40px auto; padding: 0 16px; text-align: center; }
    h1 { font-size: 2.25rem; margin-bottom: 8px; }
    p { color: #cbd5e1; }
    .card { background: #1A1A2E; border: 1px solid #2D2D4A; border-radius: 12px; padding: 20px; margin-top: 20px; }
    label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; }
    select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #0e1320; color: #fff; margin-top: 6px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; background: linear-gradient(135deg, #6C5CE7, #00D2D3); color: white; font-weight: 600; cursor: pointer; margin-top: 12px; }
    #results { display: none; margin-top: 20px; text-align: left; }
    .section-label { font-size: 0.9rem; color: #87cefa; text-transform: uppercase; margin-top: 14px; }
    .exercise { padding: 6px 0; border-bottom: 1px solid #2a2a2a; }
    .footer { text-align: center; color: #777; font-size: 12px; margin: 32px 0; }

    /* Progress Bar UI */
    .progress-wrapper { display: none; margin: 12px 0 6px; }
    .progress-wrapper.visible { display: block; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 6px; }
    .progress-bar-track { width: 100%; height: 8px; background: #111227; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.25s ease; }
    .progress-steps { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }
    .progress-steps span.active { color: var(--accent); font-weight: 600; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff3; border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container" style="text-align:center;">
    <h1>FitForge</h1>
    <p>Local AI-powered workout planner. Generate personalized workouts from goals, level, and equipment.</p>

    <div class="card">
      <form id="workout-form">
        <label for="goals">Goals</label>
        <select id="goals">
          <option value="general fitness">General Fitness</option>
          <option value="weight loss">Weight Loss</option>
          <option value="muscle gain">Muscle Gain</option>
          <option value="endurance">Endurance</option>
          <option value="flexibility">Flexibility</option>
          <option value="strength">Strength</option>
        </select>

        <label for="level">Fitness Level</label>
        <select id="level">
          <option value="beginner">Beginner</option>
          <option value="intermediate" selected>Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>

        <label for="equipment">Available Equipment</label>
        <input type="text" id="equipment" placeholder="e.g.,none, dumbbells" />

        <button type="submit" class="btn">Generate My Workout</button>
      </form>

      <div id="progress" class="progress-wrapper">
        <div class="progress-label"><span>Generating</span><span id="progress-percent">0%</span></div>
        <div class="progress-bar-track"><div id="progress-bar" class="progress-bar-fill" style="width:0%"></div></div>
        <div class="progress-steps"><span class="active">Start</span><span>In Progress</span><span>Done</span></div>
      </div>
    </div>

    <div id="results" class="card">
      <
